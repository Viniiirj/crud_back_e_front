<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <title>Cadastro de Pessoas</title>
  </head>
  <body>
    <div class="cadastro">
        <h1>Cadastro de Pessoas</h1>
        <form id="pessoaForm">
            <label >Nome<input type="text" name="nome" placeholder="Nome" id="nome"></label>
            <label >E-mail<input type="email" name="email" placeholder="E-mail" id="email"></label>
            <label >Data de Nascimento<input type="date" name="dataNasc" placeholder="Data de Nascimento" id="dataNasc"></label>

            <button type="submit" id="btnSalvar">Salvar</button>
            <button type="button"id="btnCancelar">Cancelar</button>
        </form>
    </div>

    <div class="pesquisa">
        <label>Buscar por ID<input type="number" name="id" id="buscarId"> </label>
        <button type="button" id="btnBuscar">Buscar</button>
        <button type="button" id="btnVerTd">Ver todos</button>
    </div>

    <div class="tabela" id="tabela">

    </div>

    <script src="script.js"></script>
  </body>
</html>
